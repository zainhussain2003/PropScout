name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python calc engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd services/calc-engine
          pip install -r requirements.txt
      - name: Unit tests
        run: |
          cd services/calc-engine
          pytest . -v --ignore=tests/
      - name: Golden dataset regression (95%+ gate)
        run: |
          cd services/calc-engine
          pytest tests/golden_dataset/test_extraction.py -v
      - name: Calculation regression (100% gate)
        run: |
          cd services/calc-engine
          pytest tests/test_regression.py -v

  test-typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check (web)
        run: npm run typecheck --workspace=apps/web
      - name: Type check (api)
        run: npm run typecheck --workspace=apps/api
      - name: Tests (web)
        run: npm test --workspace=apps/web
      - name: Tests (api)
        run: npm test --workspace=apps/api
