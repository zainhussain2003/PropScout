name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  typecheck-frontend:
    name: Type check — web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck --workspace=apps/web

  typecheck-api:
    name: Type check — api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck --workspace=apps/api

  test-frontend:
    name: Tests — web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test --workspace=apps/web -- --watchAll=false

  test-api:
    name: Tests — api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test --workspace=apps/api

  test-python:
    name: Tests — calc engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd services/calc-engine
          pip install -r requirements.txt
      - name: Unit tests
        run: |
          cd services/calc-engine
          pytest . -v --ignore=tests/
      - name: Calculation regression (100% gate)
        run: |
          cd services/calc-engine
          pytest tests/test_regression.py -v

  golden-dataset:
    name: Golden dataset regression (95%+ gate)
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd services/calc-engine
          pip install -r requirements.txt
      - name: Golden dataset extraction accuracy
        run: |
          cd services/calc-engine
          pytest tests/golden_dataset/test_extraction.py -v
