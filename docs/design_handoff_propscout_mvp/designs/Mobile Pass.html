<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PropScout — Mobile pass · iOS + Android key screens</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F1ECE2; --bg-elev: #FBF7EE; --surface: #FFFFFF;
    --ink: #0E1320; --ink-2: #3B3A35; --muted: #76716A;
    --line: rgba(14, 19, 32, 0.10); --line-strong: rgba(14, 19, 32, 0.16);
    --accent: #D97757; --accent-ink: #FFFFFF;
    --pass: #4F7A48; --caution: #B98724; --fail: #B14A37;
    --chip-bg: rgba(14, 19, 32, 0.04);
    --shadow-card: 0 1px 0 rgba(14,19,32,.04), 0 8px 28px -16px rgba(14,19,32,.18);
    --radius-lg: 22px;
  }
  [data-theme="dark"] {
    --bg: #0A0D14; --bg-elev: #11141C; --surface: #161A24;
    --ink: #F1ECE0; --ink-2: #C6C1B5; --muted: #807B71;
    --line: rgba(241, 236, 224, 0.10); --line-strong: rgba(241, 236, 224, 0.18);
    --chip-bg: rgba(241, 236, 224, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 16px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    transition: background-color .35s ease, color .35s ease;
  }
  .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono  { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, monospace; }
  .tabular { font-variant-numeric: tabular-nums; }

  h1, h2, h3 { margin: 0; font-weight: 500; letter-spacing: -0.02em; padding-bottom: 0.05em; }

  .row { display: flex; align-items: center; }
  .col { display: flex; flex-direction: column; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 16px; border-radius: 999px;
    font: 500 14px/1 'Geist', sans-serif;
    border: 1px solid transparent; cursor: pointer;
    transition: all .15s ease; white-space: nowrap;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--accent); color: var(--accent-ink); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px; border-radius: 999px;
    background: var(--chip-bg); color: var(--ink-2);
    font-size: 11px; font-weight: 500; border: 1px solid var(--line);
  }

  .photo-ph {
    background:
      linear-gradient(135deg, color-mix(in oklab, var(--ink) 8%, transparent), color-mix(in oklab, var(--accent) 12%, transparent)),
      repeating-linear-gradient(135deg, transparent 0 6px, color-mix(in oklab, var(--ink) 4%, transparent) 6px 7px);
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    display: flex; align-items: flex-end; padding: 8px;
  }

  @keyframes livePulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.35 } }
  .live-dot { animation: livePulse 1.6s ease-in-out infinite; }

  .scenario-label {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line-strong);
    font: 500 11px/1 'Geist Mono', monospace; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
  }
  .scenario-label::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="mobile-pass.jsx"></script>
</body>
</html>
