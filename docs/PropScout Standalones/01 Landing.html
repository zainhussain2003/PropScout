document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3e3f8936-afa3-4524-a43c-1231a6c8a52c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5931cc00-2342-4df2-a316-595341e81030\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<style>\n/* ═══════════════════════════════════════════════════════════════\n   PROPSCOUT DESIGN TOKENS · v2 \"Harbour\"\n   Port this block to tokens.css\n   ═══════════════════════════════════════════════════════════════ */\n:root {\n  /* Surfaces — cool limestone, not warm cream */\n  --bg:          #EFEFEA;\n  --bg-elev:     #F7F7F3;\n  --surface:     #FFFFFF;\n\n  /* Ink */\n  --ink:         #101820;\n  --ink-2:       #3A424B;\n  --muted:       #6E7681;\n\n  /* Lines */\n  --line:        rgba(16, 24, 32, 0.11);\n  --line-strong: rgba(16, 24, 32, 0.19);\n\n  /* Brand accent — deep harbour blue */\n  --accent:      #1F4E68;\n  --accent-hover:#17405A;\n  --accent-ink:  #FFFFFF;\n  --accent-soft: rgba(31, 78, 104, 0.08);\n\n  /* Verdict states — reserved for report data ONLY\n     Light caution darkened for AA: 5.37:1 on white, 4.65:1 on --bg */\n  --pass:        #4F7A48;\n  --caution:     #8A6410;\n  --fail:        #B14A37;\n\n  /* Chips */\n  --chip-bg:     rgba(16, 24, 32, 0.045);\n\n  /* Shadows */\n  --shadow-card: 0 1px 0 rgba(16,24,32,.04), 0 10px 30px -18px rgba(16,24,32,.22);\n  --shadow-pop:  0 28px 56px -28px rgba(16,24,32,.38), 0 4px 16px -8px rgba(16,24,32,.14);\n\n  /* Radii */\n  --r-sm: 6px;\n  --r:    12px;\n  --r-lg: 18px;\n\n  /* Layout */\n  --maxw: 1280px;\n  --gutter: clamp(20px, 4vw, 56px);\n  --sect: clamp(72px, 9vw, 140px);\n}\n\n[data-theme=\"dark\"] {\n  --bg:          #0C1116;\n  --bg-elev:     #121820;\n  --surface:     #171F28;\n  --ink:         #EDEEE9;\n  --ink-2:       #B9BDB9;\n  --muted:       #7C8590;\n  --line:        rgba(237, 238, 233, 0.10);\n  --line-strong: rgba(237, 238, 233, 0.19);\n  --accent:      #5E93B0;\n  --accent-hover:#74A5BF;\n  --accent-ink:  #0C1116;\n  --accent-soft: rgba(94, 147, 176, 0.12);\n  /* Verdict states, dark variants — measured against --surface #171F28 / --bg-elev #121820:\n     pass 6.63:1 / 7.11:1 · caution 7.62:1 / 8.17:1 · fail 5.90:1 / 6.33:1 */\n  --pass:        #7FB076;\n  --caution:     #D9A83F;\n  --fail:        #E27F63;\n  --chip-bg:     rgba(237, 238, 233, 0.06);\n  --shadow-card: 0 1px 0 rgba(255,255,255,.02) inset, 0 16px 40px -20px rgba(0,0,0,.6);\n  --shadow-pop:  0 28px 64px -20px rgba(0,0,0,.72);\n}\n\n/* ── Reset & base ─────────────────────────────────────────── */\n* { box-sizing: border-box; margin: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: 'Geist', system-ui, -apple-system, sans-serif;\n  font-size: 16px;\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n  overflow-x: clip;\n  transition: background-color .3s ease, color .3s ease;\n}\n.serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }\n.mono  { font-family: 'Geist Mono', ui-monospace, monospace; }\n.num   { font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }\n\nh1, h2, h3, h4 { font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\n\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter); }\n\n/* ── Buttons ──────────────────────────────────────────────── */\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 13px 22px; border-radius: 8px;\n  font-size: 14.5px; font-weight: 600; letter-spacing: -0.005em;\n  border: 1px solid transparent;\n  transition: background-color .16s ease, border-color .16s ease, color .16s ease, transform .1s ease;\n  white-space: nowrap;\n}\n.btn:active { transform: translateY(1px); }\n.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }\n.btn-solid { background: var(--accent); color: var(--accent-ink); }\n.btn-solid:hover { background: var(--accent-hover); }\n.btn-dark { background: var(--ink); color: var(--bg); }\n.btn-dark:hover { background: var(--accent); color: var(--accent-ink); }\n.btn-line { background: transparent; color: var(--ink); border-color: var(--line-strong); }\n.btn-line:hover { border-color: var(--accent); color: var(--accent); }\n\n/* ── Eyebrow / kicker ─────────────────────────────────────── */\n.kicker {\n  font-family: 'Geist Mono', monospace;\n  font-size: 11px; font-weight: 500;\n  letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--accent);\n  display: inline-flex; align-items: center; gap: 10px;\n}\n.kicker::before { content: \"\"; width: 26px; height: 2px; background: var(--accent); }\n\n/* ── Cards ────────────────────────────────────────────────── */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  box-shadow: var(--shadow-card);\n}\n\n/* ── Focus ────────────────────────────────────────────────── */\n:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }\n\n/* ── On-scroll reveal ─────────────────────────────────────── */\n.rv { opacity: 0; transform: translateY(14px); transition: opacity .55s ease, transform .55s ease; }\n.rv.in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) { .rv { opacity: 1; transform: none; transition: none; } }\n\n/* ═══════════════════════════════════════════════════════════\n   NAV\n   ═══════════════════════════════════════════════════════════ */\n.nav {\n  position: sticky; top: 0; z-index: 100;\n  background: color-mix(in oklab, var(--bg) 88%, transparent);\n  backdrop-filter: blur(12px) saturate(160%);\n  -webkit-backdrop-filter: blur(12px) saturate(160%);\n  border-bottom: 1px solid var(--line);\n}\n.nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 15px var(--gutter); max-width: var(--maxw); margin: 0 auto; position: relative; }\n.nav-inner > .nav-links { position: absolute; left: 50%; transform: translateX(-50%); }\n.nav-links { display: flex; gap: 30px; font-size: 14px; color: var(--ink-2); }\n.nav-links a { transition: color .14s ease; }\n.nav-links a:hover { color: var(--accent); }\n.brand { display: flex; align-items: center; gap: 10px; font-family: 'Instrument Serif', serif; font-size: 23px; letter-spacing: -0.01em; }\n.brand .sc { font-style: italic; }\n@media (max-width: 860px) { .nav-links { display: none; } }\n/* Mobile nav: wordmark + theme toggle only — the hero input is 40px below, a cramped duplicate CTA earns nothing */\n@media (max-width: 640px) {\n  .nav-actions .btn { display: none; }\n  .brand { font-size: 20px; }\n}\n\n/* ═══════════════════════════════════════════════════════════\n   HERO\n   ═══════════════════════════════════════════════════════════ */\n.hero { padding: clamp(28px, 3.5vw, 52px) 0 0; }\n.hero-grid {\n  display: grid; grid-template-columns: minmax(0, 7fr) minmax(0, 5fr);\n  gap: clamp(32px, 5vw, 72px); align-items: start;\n}\n@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; } }\n\n.hero h1 {\n  font-family: 'Instrument Serif', Georgia, serif;\n  font-weight: 400;\n  font-size: clamp(42px, 5.6vw, 78px);\n  line-height: 1.02;\n  letter-spacing: -0.028em;\n  margin: 26px 0 22px;\n}\n.hero-sub { font-size: clamp(16px, 1.4vw, 19px); color: var(--ink-2); max-width: 560px; line-height: 1.6; }\n\n.paste-bar {\n  margin-top: 34px;\n  display: flex; gap: 10px;\n  padding: 8px;\n  background: var(--surface);\n  border: 1px solid var(--line-strong);\n  border-radius: 12px;\n  box-shadow: var(--shadow-card);\n  max-width: 640px;\n}\n.paste-bar:focus-within { border-color: var(--accent); }\n.paste-input {\n  flex: 1; min-width: 0;\n  border: none; outline: none; background: transparent;\n  font-family: 'Geist Mono', monospace; font-size: 13.5px;\n  color: var(--ink); padding: 10px 12px;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.paste-input::placeholder { color: var(--muted); }\n@media (max-width: 520px) { .paste-bar { flex-direction: column; } .paste-bar .btn { width: 100%; justify-content: center; } }\n\n.hero-meta { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 8px 22px; font-size: 13px; color: var(--muted); }\n.hero-meta span { display: inline-flex; align-items: center; gap: 7px; }\n.hero-meta i { width: 5px; height: 5px; border-radius: 99px; background: var(--accent); font-style: normal; }\n\n/* Hero proof column — the report mock */\n.proof {\n  position: relative;\n}\n.proof-report {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  box-shadow: var(--shadow-pop);\n  overflow: hidden;\n}\n.proof-head {\n  padding: 16px 20px;\n  background: var(--ink);\n  color: var(--bg);\n  display: flex; justify-content: space-between; align-items: center; gap: 10px;\n}\n[data-theme=\"dark\"] .proof-head { background: var(--bg-elev); color: var(--ink); }\n.proof-body { padding: 20px; display: grid; gap: 14px; }\n.verdict-line {\n  font-family: 'Instrument Serif', serif; font-size: 19px; line-height: 1.3;\n}\n.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }\n@media (max-width: 440px) { .stat-row { grid-template-columns: 1fr; } }\n.stat {\n  background: var(--bg-elev); border: 1px solid var(--line); border-radius: 10px;\n  padding: 10px 12px;\n}\n.stat b { display: block; font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 600; margin-top: 2px; }\n.stat span { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-family: 'Geist Mono', monospace; }\n\n/* compact map strip inside the report card */\n.proof-map {\n  border-top: 1px solid var(--line);\n  overflow: hidden;\n  position: relative;\n  background: var(--bg-elev);\n  height: 132px;\n}\n.pin {\n  position: absolute; transform: translate(-50%, -100%);\n  font-family: 'Geist Mono', monospace; font-size: 10.5px; font-weight: 600;\n  background: var(--surface); border: 1px solid var(--line-strong);\n  padding: 3px 8px; border-radius: 99px;\n  box-shadow: 0 4px 10px -4px rgba(16,24,32,.3);\n}\n.pin.subject { background: var(--ink); color: var(--bg); border-color: var(--ink); }\n[data-theme=\"dark\"] .pin.subject { background: var(--ink); color: var(--bg); }\n\n/* ═══════════════════════════════════════════════════════════\n   SECTION SCAFFOLD\n   ═══════════════════════════════════════════════════════════ */\n.sect { padding-top: var(--sect); }\n.sect-head { max-width: 780px; margin-bottom: clamp(32px, 4vw, 56px); }\n.sect-head h2 {\n  font-family: 'Instrument Serif', Georgia, serif;\n  font-weight: 400;\n  font-size: clamp(30px, 3.6vw, 52px);\n  letter-spacing: -0.025em;\n  line-height: 1.05;\n  margin: 20px 0 16px;\n}\n.sect-head p { font-size: 17px; color: var(--ink-2); max-width: 620px; line-height: 1.6; }\n\n/* ═══════════════════════════════════════════════════════════\n   FOUR MODES\n   ═══════════════════════════════════════════════════════════ */\n/* Tenant card carries structural dominance: 2-1-1-1 grid — the page's one asymmetric moment */\n.modes {\n  display: grid;\n  grid-template-columns: 2fr 1fr 1fr 1fr;\n  gap: 14px;\n}\n@media (max-width: 1080px) {\n  .modes { grid-template-columns: 1fr 1fr; }\n  .mode.lead { grid-column: 1 / -1; }\n}\n@media (max-width: 620px)  { .modes { grid-template-columns: 1fr; } }\n\n.mode {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: var(--r-lg); padding: 22px;\n  display: flex; flex-direction: column; gap: 14px;\n  transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;\n}\n.mode:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-card); }\n.mode.lead { border-color: var(--accent); border-width: 1.5px; background: var(--surface); }\n.mode.lead h3 { font-size: 30px; }\n.mode.lead p { font-size: 14.5px; max-width: 420px; }\n.mode.lead .mode-mock { font-size: 13px; }\n.mode-tag { font-family: 'Geist Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }\n.mode.lead .mode-tag { color: var(--accent); }\n.mode h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 23px; letter-spacing: -0.015em; }\n.mode p { font-size: 13.5px; color: var(--ink-2); line-height: 1.55; }\n.mode-mock {\n  margin-top: auto;\n  background: var(--bg-elev); border: 1px solid var(--line); border-radius: 10px;\n  padding: 12px; font-size: 12px;\n}\n.mock-line { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--line); }\n.mock-line:last-child { border-bottom: none; }\n.mock-line .k { color: var(--muted); font-size: 11.5px; }\n.mock-line .v { font-family: 'Geist Mono', monospace; font-weight: 600; font-size: 12.5px; }\n.v.pass { color: var(--pass); } .v.caution { color: var(--caution); } .v.fail { color: var(--fail); }\n.free-pill {\n  align-self: flex-start;\n  font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 600;\n  letter-spacing: 0.12em; text-transform: uppercase;\n  background: var(--accent); color: var(--accent-ink);\n  padding: 4px 10px; border-radius: 99px;\n}\n\n/* gauge mock for investor card */\n.gauge-mock { display: flex; align-items: center; gap: 12px; }\n.gauge-ring {\n  width: 58px; height: 58px; border-radius: 99px; flex-shrink: 0;\n  background: conic-gradient(var(--fail) 0 8%, var(--line) 8% 100%);\n  display: grid; place-items: center;\n}\n.gauge-ring b {\n  width: 44px; height: 44px; border-radius: 99px; background: var(--surface);\n  display: grid; place-items: center;\n  font-family: 'Geist Mono', monospace; font-size: 16px;\n}\n.slider-mock { height: 4px; border-radius: 99px; background: var(--line); position: relative; margin: 10px 0 4px; }\n.slider-mock i { position: absolute; left: 35%; top: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; border-radius: 99px; background: var(--accent); border: 2px solid var(--surface); }\n\n/* rent positioning bar for landlord card */\n.pos-bar { height: 6px; border-radius: 99px; background: linear-gradient(90deg, var(--pass), var(--caution), var(--fail)); position: relative; margin: 12px 0 4px; }\n.pos-bar i { position: absolute; left: 78%; top: 50%; transform: translate(-50%,-50%) rotate(45deg); width: 11px; height: 11px; background: var(--ink); border: 2px solid var(--surface); border-radius: 2px; }\n\n/* ═══════════════════════════════════════════════════════════\n   PROVENANCE STRIP\n   ═══════════════════════════════════════════════════════════ */\n/* Light: ink band, paper foreground. Dark: elevated surface + visible borders, full-brightness heading. */\n.prov {\n  margin-top: var(--sect);\n  background: var(--ink);\n  color: var(--bg);\n  padding: clamp(44px, 5vw, 72px) 0;\n}\n.prov h2 { color: var(--bg); }\n[data-theme=\"dark\"] .prov {\n  background: var(--bg-elev);\n  color: var(--ink);\n  border-top: 1px solid var(--line-strong);\n  border-bottom: 1px solid var(--line-strong);\n}\n[data-theme=\"dark\"] .prov h2 { color: var(--ink); }\n[data-theme=\"dark\"] .prov-item { color: var(--ink-2); border-bottom-color: var(--line); }\n[data-theme=\"dark\"] .prov-item b { color: var(--ink); }\n[data-theme=\"dark\"] .prov-note { color: var(--muted); }\n.prov-grid { display: grid; grid-template-columns: minmax(0, 5fr) minmax(0, 7fr); gap: clamp(28px, 4vw, 64px); align-items: center; }\n@media (max-width: 900px) { .prov-grid { grid-template-columns: 1fr; } }\n.prov h2 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(26px, 3vw, 40px); letter-spacing: -0.02em; line-height: 1.1; }\n.prov-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; }\n@media (max-width: 560px) { .prov-list { grid-template-columns: 1fr; } }\n.prov-item { display: flex; gap: 10px; align-items: baseline; font-size: 14px; color: color-mix(in oklab, var(--bg) 80%, transparent); padding: 8px 0; border-bottom: 1px solid color-mix(in oklab, var(--bg) 14%, transparent); }\n.prov-item b { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 500; color: var(--bg); }\n.prov-note { margin-top: 18px; font-size: 13.5px; color: color-mix(in oklab, var(--bg) 62%, transparent); max-width: 460px; line-height: 1.6; }\n\n/* ═══════════════════════════════════════════════════════════\n   HOW IT WORKS\n   ═══════════════════════════════════════════════════════════ */\n.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }\n@media (max-width: 860px) { .steps { grid-template-columns: 1fr; } }\n.step { padding: 26px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); }\n.step-num { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 600; letter-spacing: 0.1em; }\n.step h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 22px; margin: 12px 0 8px; }\n.step p { font-size: 14px; color: var(--ink-2); line-height: 1.6; }\n\n/* ═══════════════════════════════════════════════════════════\n   SUNSCOUT\n   ════════════════════════════════════ ax-width: 560px)  { .tiers { grid-template-columns: 1fr; } }\n.tier { padding: 28px 24px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 14px; }\n.tier:last-child { border-right: none; }\n@media (max-width: 1000px) { .tier { border-bottom: 1px solid var(--line); } }\n.tier.hot { background: var(--accent-soft); position: relative; }\n.tier-name { font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }\n.tier.hot .tier-name { color: var(--accent); }\n.tier-price { font-family: 'Instrument Serif', serif; font-size: 40px; line-height: 1; }\n.tier-price small { font-size: 14px; color: var(--muted); font-family: 'Geist', sans-serif; }\n.tier ul { list-style: none; padding: 0; display: grid; gap: 8px; font-size: 13.5px; color: var(--ink-2); }\n.tier li { display: flex; gap: 9px; align-items: baseline; }\n.tier li::before { content: \"—\"; color: var(--accent); flex-shrink: 0; }\n.tier .btn { margin-top: auto; justify-content: center; }\n\n/* ═══════════════════════════════════════════════════════════\n   FAQ\n   ═══════════════════════════════════════════════════════════ */\n.faq-list { max-width: 760px; border-top: 1px solid var(--line-strong); }\n.faq-item { border-bottom: 1px solid var(--line); }\n.faq-q {\n  width: 100%; background: none; border: none; text-align: left;\n  padding: 22px 40px 22px 0;\n  font-family: 'Instrument Serif', serif; font-size: clamp(18px, 1.8vw, 22px);\n  color: var(--ink); position: relative;\n}\n.faq-q::after {\n  content: \"+\"; position: absolute; right: 4px; top: 50%; transform: translateY(-50%);\n  font-family: 'Geist Mono', monospace; font-size: 18px; color: var(--muted);\n  transition: transform .18s ease;\n}\n.faq-item.open .faq-q::after { content: \"−\"; }\n.faq-a { max-height: 0; overflow: hidden; transition: max-height .28s ease; }\n.faq-a p { padding: 0 0 22px; font-size: 15px; color: var(--ink-2); line-height: 1.65; max-widt 5\" fill=\"var(--ink)\" opacity=\".05\"><\u002Frect>\n                <rect x=\"4\" y=\"19\" width=\"14\" height=\"11\" rx=\"1.5\" fill=\"var(--ink)\" opacity=\".05\"><\u002Frect>\n                <rect x=\"22\" y=\"19\" width=\"19\" height=\"11\" rx=\"1.5\" fill=\"var(--ink)\" opacity=\".06\"><\u002Frect>\n              <\u002Fpattern>\n            <\u002Fdefs>\n            <rect width=\"420\" height=\"132\" fill=\"url(#blocksV2)\"><\u002Frect>\n            <!-- water edge, top-right -->\n            <path d=\"M 330 -8 Q 356 34 420 48 L 420 -8 Z\" fill=\"var(--accent)\" opacity=\".10\"><\u002Fpath>\n            <path d=\"M 330 -8 Q 356 34 420 48\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\".8\" opacity=\".28\"><\u002Fpath>\n            <!-- park polygon -->\n            <rect x=\"236\" y=\"66\" width=\"74\" height=\"46\" rx=\"3\" fill=\"var(--pass)\" opacity=\".14\"><\u002Frect>\n            <!-- arterials: casing + fill -->\n            <g>\n              <line x1=\"0\" y1=\"48\" x2=\"420\" y2=\"42\" stroke=\"var(--line-strong)\" stroke-width=\"7\"><\u002Fline>\n              <line x1=\"0\" y1=\"48\" x2=\"420\" y2=\"42\" stroke=\"var(--bg-elev)\" stroke-width=\"4.5\"><\u002Fline>\n              <line x1=\"104\" y1=\"0\" x2=\"110\" y2=\"132\" stroke=\"var(--line-strong)\" stroke-width=\"7\"><\u002Fline>\n              <line x1=\"104\" y1=\"0\" x2=\"110\" y2=\"132\" stroke=\"var(--bg-elev)\" stroke-width=\"4.5\"><\u002Fline>\n            <\u002Fg>\n            <!-- minor roads -->\n            <g stroke=\"var(--line)\" stroke-width=\"1.6\" opacity=\".9\">\n              <line x1=\"0\" y1=\"94\" x2=\"420\" y2=\"100\"><\u002Fline>\n              <line x1=\"210\" y1=\"0\" x2=\"206\" y2=\"132\"><\u002Fline>\n              <line x1=\"330\" y1=\"48\" x2=\"334\" y2=\"132\"><\u002Fline>\n              <line x1=\"48\" y1=\"0\" x2=\"50\" y2=\"132\"><\u002Fline>\n            <\u002Fg>\n          <\u002Fsvg>\n          <span class=\"pin\" style=\"left:20%; top:46%;\">$2,580<\u002Fspan>\n          <span class=\"pin\" style=\"left:46%; top:82%;\">$2,710<\u002Fspan>\n          <span class=\"pin subject\" style=\"left:57%; top:50%;\">$2,650 · this unit<\u002Fspan>\n          <span class=\"pin\" style=\"left:83%; top:76%;\">$2,900<\u002Fspan>\n          <span class=\"mono\" style=\"position:absolute; bottom:7px; left:12px; font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);\">Vaughan · L4K · 1 km<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ═══════════════ FOUR MODES ═══════════════ -->\n<section class=\"sect\" id=\"modes\">\n  <div class=\"wrap\">\n    <div class=\"sect-head rv\">\n      <span class=\"kicker\">One URL · four reports<\u002Fspan>\n      <h2>The same listing reads differently depending on who you are.<\u002Fh2>\n      <p>Paste once. Tell us your angle. Every section, calculation, and verdict downstream is built for that answer — a tenant sees negotiation leverage, an investor sees whether the deal pencils.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"modes\">\n      <!-- Tenant — the lead card -->\n      <article class=\"mode lead rv\">\n        <span class=\"free-pill\">Free · no sign-in<\u002Fspan>\n        <span class=\"mode-tag\">For rent · Tenant<\u002Fspan>\n        <h3>I'm looking at a rental<\u002Fh3>\n        <p>Is the rent fair? Is the \"2nd bedroom\" real? What should you actually offer? Flags fake bedrooms and tells you your leverage in dollars.<\u002Fp>\n        <!-- CAPTURE: negotiation leverage block from a real Tenant Report -->\n        <div class=\"mode-mock\">\n          <div class=\"mock-line\"><span class=\"k\">Asking<\u002Fspan><span class=\"v\">$2,650/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">Building median<\u002Fspan><span class=\"v\">$2,480<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">Your leverage<\u002Fspan><span class=\"v pass\">Strong · 31 days listed<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">Target offer<\u002Fspan><span class=\"v pass\">$2,450–2,500<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">Saved over a 12-mo lease<\u002Fspan><span class=\"v pass\">$1,800–2,400<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Home buyer -->\n      <article class=\"mode rv\">\n        <span class=\"mode-tag\">For sale · Personal<\u002Fspan>\n        <h3>I'm buying a home<\u002Fh3>\n        <p>The real monthly carry — not the listing's fantasy math. Plus schools, comps, and what to inspect.<\u002Fp>\n        <!-- CAPTURE: true monthly cost table from a real Personal Buyer Report -->\n        <div class=\"mode-mock\">\n          <div class=\"mock-line\"><span class=\"k\">Mortgage @ 4.79%<\u002Fspan><span class=\"v\">$3,978<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">Tax + insurance<\u002Fspan><span class=\"v\">$572<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">All-in monthly<\u002Fspan><span class=\"v caution\">$5,180<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Investor -->\n      <article class=\"mode rv\">\n        <span class=\"mode-tag\">For sale · Investment<\u002Fspan>\n        <h3>I'm running the numbers<\u002Fh3>\n        <p>Cap rate, cash flow, DSCR, OSFI at the stress rate. Drag the sliders and every metric recalculates.<\u002Fp>\n        <!-- CAPTURE: deal-score gauge + one financing slider from a real Investor Report -->\n        <div class=\"mode-mock\">\n          <div class=\"gauge-mock\">\n            <div class=\"gauge-ring\"><b>8<\u002Fb><\u002Fdiv>\n            <div>\n              <div class=\"mock-line\" style=\"border:none; padding:2px 0;\"><span class=\"k\">Cap rate<\u002Fspan><span class=\"v fail\">2.48%<\u002Fspan><\u002Fdiv>\n              <div class=\"mock-line\" style=\"border:none; padding:2px 0;\"><span class=\"k\">Cash flow<\u002Fspan><span class=\"v fail\">−$1,833<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"slider-mock\"><i><\u002Fi><\u002Fdiv>\n          <span class=\"k mono\" style=\"font-size:10px; color:var(--muted);\">20% down · drag to test 35%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Landlord -->\n      <article class=\"mode rv\">\n        <span class=\"mode-tag\">For rent · Landlord<\u002Fspan>\n        <h3>I'm pricing my unit<\u002Fh3>\n        <p>Where your ask sits against the building — and what every week of vacancy costs you.<\u002Fp>\n        <!-- CAPTURE: rent positioning bar from a real Landlord Report -->\n        <div class=\"mode-mock\">\n          <div class=\"mock-line\"><span class=\"k\">Your ask<\u002Fspan><span class=\"v caution\">$3,400/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"mock-line\"><span class=\"k\">Building P50<\u002Fspan><span class=\"v\">$3,100<\u002Fspan><\u002Fdiv>\n          <div class=\"pos-bar\"><i><\u002Fi><\u002Fdiv>\n          <span class=\"k mono\" style=\"font-size:10px; color:var(--muted);\">38 days on market · above range<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ PROVENANCE ═══════════════ -->\n<section class=\"prov\">\n  <div class=\"wrap prov-grid\">\n    <div class=\"rv\">\n      <span class=\"kicker\" style=\"color:var(--accent);\">Data provenance<\u002Fspan>\n      <h2 style=\"margin-top:18px;\">Every number has a source, a date, and a method.<\u002Fh2>\n      <p class=\"prov-note\">When a number is low-confidence — thin comps, stale data — the report says so instead of pretending. You'll never see a figure without knowing where it came from.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"prov-list rv\">\n      <div class=\"prov-item\"><b>Bank of Canada<\u002Fb> policy &amp; posted rates, daily<\u002Fdiv>\n      <div class=\"prov-item\"><b>CMHC<\u002Fb> vacancy rates by metro, annual<\u002Fdiv>\n      <div class=\"prov-item\"><b>Rentals.ca · Kijiji · PadMapper<\u002Fb> comps scraped nightly<\u002Fdiv>\n      <div class=\"prov-item\"><b>EQAO + Fraser Institute<\u002Fb> school rankings<\u002Fdiv>\n      <div class=\"prov-item\"><b>Walk Score<\u002Fb> walk · transit · bike<\u002Fdiv>\n      <div class=\"prov-item\"><b>OSFI B-20<\u002Fb> stress test at qualifying rate<\u002Fdiv>\n      <div class=\"prov-item\"><b>Ontario LTT<\u002Fb> brackets incl. Toronto stacking<\u002Fdiv>\n      <div class=\"prov-item\"><b>NREL SPA<\u002Fb> solar position, per window<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ HOW IT WORKS ═══════════════ -->\n<section class=\"sect\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"sect-head rv\">\n      <span class=\"kicker\">How it works<\u002Fspan>\n      <h2>Under sixty seconds, three steps.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step rv\">\n        <span class=\"step-num\">01<\u002Fspan>\n        <h3>Paste the link<\u002Fh3>\n        <p>Any Realtor.ca or Zillow listing. We read price, taxes, fees, beds, sqft, and the full description — including what the description tries not to say.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step rv\">\n        <span class=\"step-num\">02<\u002Fspan>\n        <h3>Tell us your angle<\u002Fh3>\n        <p>One question: tenant, buyer, investor, or landlord. The entire report reshapes around your decision — no sections that don't apply to you.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step rv\">\n        <span class=\"step-num\">03<\u002Fspan>\n        <h3>Read the verdict<\u002Fh3>\n        <p>Comps, costs, flags, and a written verdict with the dollar figures that justify it. Export the PDF or share the link.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ SUNSCOUT ═══════════════ -->\n<section class=\"sect\">\n  <div class=\"wrap sun-grid\">\n    <div class=\"rv\">\n      <span class=\"kicker\">SunScout<\u002Fspan>\n      <h2 style=\"font-family:'Instrument Serif', serif; font-weight:400; font-size:clamp(28px,3.2vw,46px); letter-spacing:-0.025em; line-height:1.06; margin:20px 0 16px;\">How much direct sun each window gets — by hour, by month.<\u002Fh2>\n      <p style=\"font-size:16.5px; color:var(--ink-2); line-height:1.65; max-width:480px;\">\n        We run the NREL solar position algorithm against the exact coordinates and window bearings. A north-facing den in December is a different room than the July showing suggested. Every report includes the seasonal light picture — before you commit to a year of it.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"sun-visual rv\" aria-hidden=\"true\">\n      <!-- CAPTURE: SunScout monthly bar chart from any real report -->\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n        <span class=\"mono\" style=\"font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);\">Direct sun · hours per month · south-facing, 37th floor<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:12px; color:var(--accent); font-weight:600;\">1,512 h/yr<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"sun-bars\">\n        <div><span class=\"bar\" style=\"height:34%;\"><\u002Fspan><label>J<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:42%;\"><\u002Fspan><label>F<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:58%;\"><\u002Fspan><label>M<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:74%;\"><\u002Fspan><label>A<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar peak\" style=\"height:90%;\"><\u002Fspan><label>M<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar peak\" style=\"height:98%;\"><\u002Fspan><label>J<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar peak\" style=\"height:100%;\"><\u002Fspan><label>J<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar peak\" style=\"height:90%;\"><\u002Fspan><label>A<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:70%;\"><\u002Fspan><label>S<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:52%;\"><\u002Fspan><label>O<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:36%;\"><\u002Fspan><label>N<\u002Flabel><\u002Fdiv>\n        <div><span class=\"bar\" style=\"height:28%;\"><\u002Fspan><label>D<\u002Flabel><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ FOUNDER NOTE ═══════════════ -->\n<section class=\"sect\">\n  <div class=\"wrap founder rv\">\n    <span class=\"kicker\">Why this exists<\u002Fspan>\n    <!-- PLACEHOLDER: founder supplies 3–4 first-person sentences here. Keep the border-left treatment. -->\n    <p class=\"founder-quote\">\n      [Founder note — 3–4 first-person sentences about why PropScout exists. Written by the founder, not generated. Replace this placeholder before launch.]\n    <\u002Fp>\n    <p class=\"independent\"><i><\u002Fi>PropScout is independent. No brokerage owns it, no listing site pays it.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ PRICING ═══════════════ -->\n<section class=\"sect\" id=\"pricing\">\n  <div class=\"wrap\">\n    <div class=\"sect-head rv\">\n      <span class=\"kicker\">Pricing · CAD<\u002Fspan>\n      <h2>Free for renters. Paid tiers for people running numbers.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"tiers rv\">\n      <div class=\"tier\">\n        <span class=\"tier-name\">Free<\u002Fspan>\n        <div class=\"tier-price\">$0<\u002Fdiv>\n        <ul>\n          <li>10 analyses a month<\u002Fli>\n          <li>Full rental comps<\u002Fli>\n          <li>Basic verdict<\u002Fli>\n          <li>Unlimited tenant reports<\u002Fli>\n        <\u002Ful>\n        <a href=\"#analyze\" class=\"btn btn-line\">Start free<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"tier hot\">\n        <span class=\"tier-name\">Investor Pro<\u002Fspan>\n        <div class=\"tier-price\">$10<small>/mo<\u002Fsmall><\u002Fdiv>\n        <ul>\n          <li>Unlimited analyses<\u002Fli>\n          <li>Full written verdict<\u002Fli>\n          <li>PDF export<\u002Fli>\n          <li>SunScout+ obstruction<\u002Fli>\n          <li>Financing sliders<\u002Fli>\n        <\u002Ful>\n        <a href=\"#\" class=\"btn btn-solid\">Go Pro<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"tier\">\n        <span class=\"tier-name\">Professional<\u002Fspan>\n        <div class=\"tier-price\">$59<small>/mo<\u002Fsmall><\u002Fdiv>\n        <ul>\n          <li>Everything in Pro<\u002Fli>\n          <li>White-label PDF<\u002Fli>\n          <li>Client share links<\u002Fli>\n        <\u002Ful>\n        <a href=\"#\" class=\"btn btn-line\">Start Professional<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"tier\">\n        <span class=\"tier-name\">Team<\u002Fspan>\n        <div class=\"tier-price\">$299<small>/mo<\u002Fsmall><\u002Fdiv>\n        <ul>\n          <li>Multi-user seats<\u002Fli>\n          <li>API access<\u002Fli>\n          <li>Portfolio reporting<\u002Fli>\n        <\u002Ful>\n        <a href=\"#\" class=\"btn btn-line\">Talk to us<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ FAQ ═══════════════ -->\n<section class=\"sect\" id=\"faq\">\n  <div class=\"wrap\">\n    <div class=\"sect-head rv\">\n      <span class=\"kicker\">FAQ<\u002Fspan>\n      <h2>Questions people ask before trusting a verdict.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq-list rv\">\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Where do the rental comps come from?<\u002Fbutton>\n        <div class=\"faq-a\"><p>A nightly scrape of Rentals.ca, Kijiji, and PadMapper across Ontario. Every comp is deduplicated, geocoded, and timestamped. The report shows you the comp count, the date range, and a confidence rating — comps from the same building weigh more than comps from the same postal district.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">What if there are no comps for my listing?<\u002Fbutton>\n        <div class=\"faq-a\"><p>The analysis still runs, and the report flags the rent estimate as low-confidence instead of hiding it. You can widen the radius or override the estimated rent with your own number — every downstream metric recalculates.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Is this financial advice?<\u002Fbutton>\n        <div class=\"faq-a\"><p>No. PropScout is an analysis tool — the methodology is published and every number is sourced, but the decision is yours. For a purchase you should still engage a real estate lawyer, a mortgage broker, and an inspector. The report gives you the questions to bring them.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Why Ontario only?<\u002Fbutton>\n        <div class=\"faq-a\"><p>Land transfer tax, rent control, and our comps database are all province-specific. Running Ontario rules on a BC property would overstate closing costs by tens of thousands. We gate other provinces cleanly and will open BC when the data engine is calibrated — not before.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">How is the deal score calculated?<\u002Fbutton>\n        <div class=\"faq-a\"><p>Five weighted components — cap rate (25), cash flow (25), cash-on-cash return (20), DSCR (15), rental demand (10) — minus deductions for risk flags like condo-fee burden or a tenanted unit at inherited rent. The full formula is published in the methodology; the same inputs always produce the same score.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">Does PropScout use Canadian mortgage math?<\u002Fbutton>\n        <div class=\"faq-a\"><p>Yes — semi-annual compounding as Canadian lenders actually quote, the OSFI B-20 stress test at the qualifying rate, and Ontario LTT brackets including Toronto's municipal stacking. No US formulas anywhere.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ FOOTER ═══════════════ -->\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <a href=\"#\" class=\"brand\" style=\"font-size:19px;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 32 32\" fill=\"none\" aria-hidden=\"true\">\n          <circle cx=\"16\" cy=\"16\" r=\"14.5\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.35\"><\u002Fcircle>\n          <path d=\"M5 21 L16 8 L27 21\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <circle cx=\"16\" cy=\"21\" r=\"1.9\" fill=\"currentColor\"><\u002Fcircle>\n          <path d=\"M16 4 L16 7\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        Prop<span class=\"sc\">Scout<\u002Fspan>\n      <\u002Fa>\n      <div class=\"foot-links\">\n        <a href=\"#\">Privacy<\u002Fa>\n        <a href=\"#\">Terms<\u002Fa>\n        <a href=\"#\">Methodology<\u002Fa>\n        <a href=\"#\">Data sources<\u002Fa>\n        <a href=\"mailto:support@propscout.ca\">support@propscout.ca<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"disclaimer\">\n      PropScout is an analysis tool, not financial or legal advice. Reports are estimates built from public listings and public data. Always confirm with a licensed real estate professional, lawyer, and accountant before signing anything. © 2026 PropScout Analytics Inc. · Toronto, Ontario.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Theme toggle — persists to localStorage under its own key; ?theme=dark forces it (for review iframes)\n(function () {\n  var KEY = 'propscout-v2-theme';\n  var param = new URLSearchParams(location.search).get('theme');\n  var saved = param || localStorage.getItem(KEY);\n  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');\n  document.getElementById('themeToggle').addEventListener('click', function () {\n    var dark = document.documentElement.getAttribute('data-theme') === 'dark';\n    if (dark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem(KEY, 'light'); }\n    else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem(KEY, 'dark'); }\n  });\n})();\n\n// FAQ accordion\ndocument.querySelectorAll('.faq-q').forEach(function (btn) {\n  btn.addEventListener('click', function () {\n    var item = btn.parentElement;\n    var answer = item.querySelector('.faq-a');\n    var open = item.classList.contains('open');\n    document.querySelectorAll('.faq-item.open').forEach(function (o) {\n      o.classList.remove('open');\n      o.querySelector('.faq-a').style.maxHeight = '0px';\n    });\n    if (!open) {\n      item.classList.add('open');\n      answer.style.maxHeight = answer.scrollHeight + 'px';\n    }\n  });\n});\n\n// On-scroll reveals\n(function () {\n  if (!('IntersectionObserver' in window)) {\n    document.querySelectorAll('.rv').forEach(function (el) { el.classList.add('in'); });\n    return;\n  }\n  var io = new IntersectionObserver(function (entries) {\n    entries.forEach(function (e) {\n      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n    });\n  }, { threshold: 0.12 });\n  document.querySelectorAll('.rv').forEach(function (el) { io.observe(el); });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
