<style>
/* ═══════════════════════════════════════════════════════════════
   PROPSCOUT DESIGN TOKENS · v2 "Harbour"
   Port this block to tokens.css
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* Surfaces — cool limestone, not warm cream */
  --bg:          #EFEFEA;
  --bg-elev:     #F7F7F3;
  --surface:     #FFFFFF;

  /* Ink */
  --ink:         #101820;
  --ink-2:       #3A424B;
  --muted:       #6E7681;

  /* Lines */
  --line:        rgba(16, 24, 32, 0.11);
  --line-strong: rgba(16, 24, 32, 0.19);

  /* Brand accent — deep harbour blue */
  --accent:      #1F4E68;
  --accent-hover:#17405A;
  --accent-ink:  #FFFFFF;
  --accent-soft: rgba(31, 78, 104, 0.08);

  /* Verdict states — reserved for report data ONLY
     Light caution darkened for AA: 5.37:1 on white, 4.65:1 on --bg */
  --pass:        #4F7A48;
  --caution:     #8A6410;
  --fail:        #B14A37;

  /* Chips */
  --chip-bg:     rgba(16, 24, 32, 0.045);

  /* Shadows */
  --shadow-card: 0 1px 0 rgba(16,24,32,.04), 0 10px 30px -18px rgba(16,24,32,.22);
  --shadow-pop:  0 28px 56px -28px rgba(16,24,32,.38), 0 4px 16px -8px rgba(16,24,32,.14);

  /* Radii */
  --r-sm: 6px;
  --r:    12px;
  --r-lg: 18px;

  /* Layout */
  --maxw: 1280px;
  --gutter: clamp(20px, 4vw, 56px);
  --sect: clamp(72px, 9vw, 140px);
}

[data-theme="dark"] {
  --bg:          #0C1116;
  --bg-elev:     #121820;
  --surface:     #171F28;
  --ink:         #EDEEE9;
  --ink-2:       #B9BDB9;
  --muted:       #7C8590;
  --line:        rgba(237, 238, 233, 0.10);
  --line-strong: rgba(237, 238, 233, 0.19);
  --accent:      #5E93B0;
  --accent-hover:#74A5BF;
  --accent-ink:  #0C1116;
  --accent-soft: rgba(94, 147, 176, 0.12);
  /* Verdict states, dark variants — measured against --surface #171F28 / --bg-elev #121820:
     pass 6.63:1 / 7.11:1 · caution 7.62:1 / 8.17:1 · fail 5.90:1 / 6.33:1 */
  --pass:        #7FB076;
  --caution:     #D9A83F;
  --fail:        #E27F63;
  --chip-bg:     rgba(237, 238, 233, 0.06);
  --shadow-card: 0 1px 0 rgba(255,255,255,.02) inset, 0 16px 40px -20px rgba(0,0,0,.6);
  --shadow-pop:  0 28px 64px -20px rgba(0,0,0,.72);
}
</style>
